version: '3.8'

services:

  # ─── POSTGRES (for Auth + Account + Transaction + Loan services) ───
  postgres:
    image: postgres:15
    container_name: finflow-postgres
    environment:
      POSTGRES_USER: finflow
      POSTGRES_PASSWORD: finflow123
      POSTGRES_DB: finflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - finflow-network

  # ─── MONGODB (for Notifications + Analytics) ───
  mongodb:
    image: mongo:6
    container_name: finflow-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: finflow
      MONGO_INITDB_ROOT_PASSWORD: finflow123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - finflow-network

  # ─── REDIS (for caching in Analytics service) ───
  redis:
    image: redis:7-alpine
    container_name: finflow-redis
    ports:
      - "6379:6379"
    networks:
      - finflow-network

  # ─── ZOOKEEPER (required by Kafka) ───
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: finflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - finflow-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: finflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - finflow-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finflow-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - finflow-network

  # ─── KEYCLOAK (Auth server) ───
  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: finflow-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin123
    ports:
      - "8080:8080"
    command: start-dev
    networks:
      - finflow-network

  # ─── KAFKA UI (optional but very helpful to visualize Kafka topics) ───
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: finflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "9090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: finflow-kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - finflow-network

# ─── VOLUMES ───
volumes:
  postgres_data:
  mongo_data:

# ─── NETWORK ───
networks:
  finflow-network:
    driver: bridge