server:
  port: 8084

spring:
  application:
    name: finflow-notification-service
  config:
    import: optional:configserver:http://localhost:8889
  data:
    mongodb:
      uri: mongodb://finflow:finflow123@localhost:27017/finflow_notifications?authSource=admin
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: finflow-notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.kafka: DEBUG
    com.finflow: DEBUG

info:
  app:
    name: FinFlow Notification Service
    version: 1.0.0